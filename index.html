<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Page</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head> 

<body>
    
    <header>
        <div class="container">
        <div class="header-title">
            <h1>Find your film</h1>
            <a href="watchlist.html" class="watch-link">My Watchlist</a>
        </div>
        </div>
    </header>
    <main>
        <section class="search-section">
            <div class="container">
            <div class="search-bar">
                <form class="search-form">
                    <div class="input-container">
                    <img src="search_2.png" class="search-icon" />
                    <input type="text" placeholder="Search for a movie"/>
                    </div>
                    <button id="search-btn" type="submit">Search</button>
                </form>
            </div>
            </div>
        </section>

        <section>
            <div class="container">
            <div class="results-container">
                <div class="message-container">
                <img class="temp-img" src="no-data-initial.png" alt="no movies search yet" />
                </div>
            </div>
            </div>
        </section>
    </main>
    <script type="module" src="search-page.js"></script>
</body>

<!---
    improvements:
    - read more for long plots
    - adjust to smaller screens & bigger screens
    - improve styling of the page
-->
</html>
